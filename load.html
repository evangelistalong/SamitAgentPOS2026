<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#7c3900">
    <link rel="icon" href="data:,">
    <title>Truck Load</title>
    <link rel="stylesheet" href="base.css">
    <style>
        /* ── LOAD THEME: orange/amber overrides ── */
        :root{
            --load-accent: #f97316;
            --load-accent2: #ea580c;
            --load-bg: #1c0f00;
            --load-bg2: #2a1600;
            --load-bg3: #3a1f00;
            --load-surface: rgba(249,115,22,0.07);
            --load-border: rgba(249,115,22,0.25);
        }
        body{background:var(--load-bg);}
        .topbar{background:var(--load-bg2);border-bottom:1px solid var(--load-border);}
        .content{background:var(--load-bg);}
        /* Override accent for this page */
        .cat-tab.active{background:var(--load-accent);color:#000;border-color:var(--load-accent);}
        .item-card.in-cart{border-color:var(--load-accent);background:rgba(249,115,22,0.12);}
        .item-card .ic-price{color:var(--load-accent);}
        .item-card .ic-badge{background:var(--load-accent);color:#000;}
        .float-load{background:var(--load-accent);color:#000;}
        .load-count{background:#000;color:var(--load-accent);}
        .ci-total{color:var(--load-accent);}
        .btn-load-primary{background:var(--load-accent);color:#000;border:none;border-radius:var(--radius);padding:10px 20px;font-weight:700;font-size:0.9rem;cursor:pointer;}
        .btn-load-primary:active{background:var(--load-accent2);}
        /* shared layout */
        .cat-tabs{display:flex;gap:6px;overflow-x:auto;padding:0 0 8px;scrollbar-width:none;margin-bottom:8px;}
        .cat-tabs::-webkit-scrollbar{display:none;}
        .cat-tab{flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:0.75rem;font-weight:600;cursor:pointer;border:1px solid var(--load-border);background:var(--load-surface);color:var(--text2);white-space:nowrap;}
        .item-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-bottom:110px;}
        .item-card{background:var(--load-surface);border:1px solid var(--load-border);border-radius:var(--radius);padding:10px 8px;display:flex;flex-direction:column;align-items:center;text-align:center;cursor:pointer;position:relative;transition:background 0.15s;user-select:none;}
        .item-card:active{background:var(--load-bg3);}
        .item-card.already-loaded{opacity:0.5;cursor:not-allowed;}
        .item-card .ic-name{font-size:0.72rem;font-weight:600;line-height:1.3;margin-bottom:4px;min-height:2.6em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
        .item-card .ic-price{font-size:0.8rem;font-weight:700;}
        .item-card .ic-badge{position:absolute;top:4px;right:4px;border-radius:50%;width:18px;height:18px;font-size:0.6rem;font-weight:700;display:flex;align-items:center;justify-content:center;}
        .float-load{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);border:none;border-radius:24px;padding:12px 28px;font-size:0.9rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.5);display:flex;align-items:center;gap:10px;z-index:100;}
        .float-load:active{transform:translateX(-50%) scale(0.96);}
        .load-count{border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;}
        .load-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--load-border);}
        .load-item:last-child{border-bottom:none;}
        .li-info{flex:1;min-width:0;}
        .li-name{font-size:0.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .li-sub{font-size:0.7rem;color:var(--text2);}
        .li-total{font-size:0.85rem;font-weight:700;min-width:60px;text-align:right;}
        .photo-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer;border:1px solid var(--load-border);background:rgba(96,165,250,0.1);color:var(--blue);width:100%;margin-top:8px;}
        .version-bar{text-align:center;font-size:0.68rem;color:var(--text2);padding:4px 0 2px;}
        .footer-bar{text-align:center;font-size:0.65rem;color:var(--text2);padding:12px 0 20px;opacity:0.5;}
        /* card overrides for load theme */
        .card{background:var(--load-surface);border-color:var(--load-border);}
        .modal{background:#1c1209;}
        .input-field{background:var(--load-bg2);border-color:var(--load-border);}
    </style>
</head>
<body>
<div class="version-bar" id="versionBar">v&#8203;</div>
<div class="topbar">
    <a href="index.html" class="topbar-back">&#8249;</a>
    <h1>&#128230; Truck Load</h1>
    <span class="topbar-action"></span>
</div>
<div class="content" style="padding-bottom:0;">
    <!-- Summary -->
    <div class="card mb-3" style="padding:10px 16px;">
        <div class="flex-between">
            <div><span class="fw-bold" style="color:var(--load-accent)" id="totalItems">0</span> <span class="text-muted text-sm">items</span></div>
            <div><span class="fw-bold" id="totalQty">0</span> <span class="text-muted text-sm">total qty</span></div>
            <div><span class="fw-bold" style="color:var(--load-accent)" id="totalValue">&#8369;0</span> <span class="text-muted text-sm">value</span></div>
        </div>
    </div>
    <div style="margin-bottom:8px;">
        <input type="text" class="input-field" id="itemSearch" placeholder="&#128269; Search items to load..." oninput="filterGrid()" autocomplete="off" style="font-size:0.85rem;">
    </div>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="item-grid" id="itemGrid">
        <div class="text-center text-muted" style="grid-column:span 3;padding:40px 0;"><div style="font-size:2rem;">&#8987;</div><div>Loading catalog...</div></div>
    </div>
    <div class="footer-bar" id="footerBar">Created by Paul Evangelista</div>
</div>

<button class="float-load" id="floatLoadBtn" style="display:none;" onclick="openLoadCart()">
    <span>&#128230; View Load</span>
    <span class="load-count" id="loadCount">0</span>
    <span id="loadTotal" style="font-size:0.85rem;">&#8369;0</span>
</button>

<!-- Qty Modal -->
<div class="modal-overlay" id="qtyModal">
    <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-title" id="qtyTitle" style="font-size:0.9rem;"></div>
        <div class="text-muted text-sm mb-3" id="qtyPrice"></div>
        <div class="qty-control" style="justify-content:center;display:flex;width:100%;margin-bottom:12px;">
            <button class="qty-btn" onclick="qtyAdj(-10)" style="width:54px;height:54px;font-size:1rem;">&#8722;10</button>
            <button class="qty-btn" onclick="qtyAdj(-1)"  style="width:46px;height:54px;font-size:1.3rem;">&#8722;</button>
            <input type="number" class="qty-value" id="qtyInput" value="1" min="1" style="width:80px;height:54px;font-size:1.4rem;text-align:center;" onclick="this.select()">
            <button class="qty-btn" onclick="qtyAdj(1)"   style="width:46px;height:54px;font-size:1.3rem;">+</button>
            <button class="qty-btn" onclick="qtyAdj(10)"  style="width:54px;height:54px;font-size:1rem;">+10</button>
        </div>
        <div class="grid-2">
            <button class="btn btn-secondary" onclick="document.getElementById('qtyModal').classList.remove('active');pendingItem=null;">Cancel</button>
            <button class="btn-load-primary" onclick="confirmQty()">&#10133; Add to Load</button>
        </div>
    </div>
</div>

<!-- Load Cart Modal -->
<div class="modal-overlay" id="loadCartModal">
    <div class="modal" style="max-height:92vh;display:flex;flex-direction:column;">
        <div class="modal-handle"></div>
        <div class="modal-title" style="margin-bottom:4px;color:var(--load-accent);">&#128230; Load List</div>
        <!-- Summary -->
        <div class="card mb-3" style="padding:10px 14px;">
            <div class="flex-between">
                <div><span class="fw-bold" style="color:var(--load-accent)" id="lcItems">0</span> <span class="text-muted text-sm">items</span></div>
                <div><span class="fw-bold" id="lcQty">0</span> <span class="text-muted text-sm">total qty</span></div>
                <div><span class="fw-bold" style="color:var(--load-accent)" id="lcValue">&#8369;0</span></div>
            </div>
        </div>
        <div id="loadList" style="flex:1;overflow-y:auto;min-height:0;"></div>
        <div class="grid-2 mt-3">
            <button class="btn btn-secondary" onclick="document.getElementById('loadCartModal').classList.remove('active')">&#8592; Add More</button>
            <button class="btn-load-primary" id="submitBtn" onclick="submitForChecking()">&#x2705; Submit for Checking</button>
        </div>
        <button class="photo-btn" id="loadPhotoBtn" onclick="takeLoadPhoto()" style="margin-top:8px;">&#128247; Take Photo of Load Sheet</button>
    </div>
</div>

<script src="config.js"></script>
<script src="sheets.js"></script>
<script src="base.js"></script>
<script src="version.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
    if(typeof APP_VERSION!=='undefined'){
        document.getElementById('versionBar').textContent='v'+APP_VERSION;
        document.getElementById('footerBar').textContent='Created by '+APP_BUILT_BY+' \u00b7 v'+APP_VERSION;
    }
});
let loadCart=[],allItems=[],pendingItem=null,activeCategory='All',searchQ='',existingLoad=[];
function getCategory(sku){ return (typeof getItemCategory === 'function') ? getItemCategory(sku) : 'Others'; }
function buildCategoryTabs(){
    const cats=['All',...new Set(allItems.map(i=>getCategory(i.sku)))];
    document.getElementById('catTabs').innerHTML=cats.map(c=>`<div class="cat-tab ${c===activeCategory?'active':''}" onclick="setCategory('${c}')">${c}</div>`).join('');
}
function setCategory(cat){activeCategory=cat;buildCategoryTabs();renderGrid();}
function renderGrid(){
    const q=searchQ.toLowerCase();
    let items=allItems;
    if(activeCategory!=='All')items=items.filter(i=>getCategory(i.sku)===activeCategory);
    if(q)items=items.filter(i=>i.name.toLowerCase().includes(q)||i.sku.includes(q));
    const el=document.getElementById('itemGrid');
    if(!items.length){el.innerHTML='<div class="text-center text-muted" style="grid-column:span 3;padding:30px 0;"><div style="font-size:2rem;">&#128269;</div><div>No items</div></div>';return;}
    const loadedSkus=new Set([...existingLoad.map(i=>i.sku),...loadCart.map(i=>i.sku)]);
    el.innerHTML=items.map(item=>{
        const alreadyLoaded=loadedSkus.has(item.sku);
        const inCart=loadCart.find(c=>c.sku===item.sku);
        const safeJson=JSON.stringify(item).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
        const clickHandler=alreadyLoaded&&!inCart
            ? 'showToast(\'Already loaded\',true)'
            : `openAddModal(JSON.parse(this.getAttribute('data-item').replace(/&quot;/g,'"')))`;
        const onhand = item.onhand !== undefined ? item.onhand : null;
        const stockLabel = onhand !== null
            ? (onhand <= 0
                ? '<div class="ic-stock" style="color:var(--red);">Out of stock</div>'
                : (onhand <= 20
                    ? '<div class="ic-stock" style="color:var(--accent);">'+onhand+' left</div>'
                    : '<div class="ic-stock" style="color:var(--green);">'+onhand+' on hand</div>'))
            : '';
        return`<div class="item-card ${alreadyLoaded&&!inCart?'already-loaded':''} ${inCart?'in-cart':''}"
                data-item="${safeJson}"
                onclick="${clickHandler}">
            ${inCart?'<span class="ic-badge">'+inCart.qty+'</span>':''}
            <div class="ic-name">${item.name}</div>
            <div class="ic-price" style="font-size:0.72rem;color:var(--text2);">${fmt(item.wholesale||item.price)}</div>
            ${stockLabel}
            ${alreadyLoaded&&!inCart?'<div style="font-size:0.6rem;color:var(--text2);">Loaded</div>':''}
        </div>`;
    }).join('');
}
function filterGrid(){searchQ=document.getElementById('itemSearch').value;renderGrid();}
function promptQty(item){
    pendingItem=item;
    const existing=loadCart.find(c=>c.sku===item.sku);
    document.getElementById('qtyTitle').textContent=item.name;
    document.getElementById('qtyPrice').textContent=fmt(item.wholesale||item.price)+' per unit';
    document.getElementById('qtyInput').value=existing?existing.qty:1;
    document.getElementById('qtyModal').classList.add('active');
    setTimeout(()=>document.getElementById('qtyInput').select(),200);
}
function qtyAdj(d){const el=document.getElementById('qtyInput');el.value=Math.max(1,(parseInt(el.value)||0)+d);}
function confirmQty(){
    if(!pendingItem)return;
    const qty=parseInt(document.getElementById('qtyInput').value)||1;
    const price=pendingItem.wholesale||pendingItem.price;
    const existing=loadCart.find(c=>c.sku===pendingItem.sku);
    if(existing){existing.qty=qty;}
    else{loadCart.push({sku:pendingItem.sku,name:pendingItem.name,price,qty});}
    document.getElementById('qtyModal').classList.remove('active');
    pendingItem=null;
    showToast(qty+'\u00d7 '+(existing?'updated':'added to load'));
    updateFloatBtn();renderGrid();
}
function getLoadTotal(){return loadCart.reduce((s,c)=>s+c.qty*c.price,0);}
function updateFloatBtn(){
    const btn=document.getElementById('floatLoadBtn');
    const qty=loadCart.reduce((s,c)=>s+c.qty,0);
    if(!qty){btn.style.display='none';return;}
    btn.style.display='flex';
    document.getElementById('loadCount').textContent=qty;
    document.getElementById('loadTotal').textContent=fmt(getLoadTotal());
    document.getElementById('totalItems').textContent=loadCart.length+existingLoad.length;
    document.getElementById('totalQty').textContent=loadCart.reduce((s,c)=>s+c.qty,0)+existingLoad.reduce((s,c)=>s+(c.loadQty||0),0);
    document.getElementById('totalValue').textContent=fmt(getLoadTotal()+existingLoad.reduce((s,c)=>s+(c.loadQty||0)*c.price,0));
}
function openLoadCart(){
    renderLoadList();
    document.getElementById('loadCartModal').classList.add('active');
}
function renderLoadList(){
    const all=[...existingLoad.map(i=>({...i,isExisting:true})),...loadCart.map(i=>({...i,isExisting:false}))];
    document.getElementById('lcItems').textContent=all.length;
    document.getElementById('lcQty').textContent=all.reduce((s,i)=>s+(i.loadQty||i.qty||0),0);
    document.getElementById('lcValue').textContent=fmt(all.reduce((s,i)=>s+(i.loadQty||i.qty||0)*i.price,0));
    if(!all.length){document.getElementById('loadList').innerHTML='<div class="text-center text-muted" style="padding:20px;">No items in load</div>';return;}
    document.getElementById('loadList').innerHTML=all.map((item,i)=>`
        <div class="load-item">
            <div class="li-info">
                <div class="li-name">${item.name}</div>
                <div class="li-sub">SKU: ${item.sku} \u2022 ${fmt(item.price)}${item.isExisting?' \u2022 <span style="color:var(--load-accent);font-size:0.65rem;">Already loaded</span>':''}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
                <span class="fw-bold" style="min-width:36px;text-align:center;">${item.loadQty||item.qty}</span>
                ${!item.isExisting?`<button onclick="removeFromLoad(${i-existingLoad.length})" style="background:none;border:none;color:var(--red);font-size:1.1rem;cursor:pointer;">\u2715</button>`:''}
            </div>
            <div class="li-total" style="color:var(--load-accent);">${fmt((item.loadQty||item.qty)*item.price)}</div>
        </div>`).join('');
}
function removeFromLoad(i){loadCart.splice(i,1);renderLoadList();updateFloatBtn();renderGrid();}
async function submitForChecking(){
    if(!loadCart.length){showToast('Nothing new to submit',true);return;}
    const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='\u23f3 Submitting...';
    let ok=0;
    for(const item of loadCart){
        const result=await Sheets.addLoadItem(item.sku,item.name,item.price,item.qty);
        if(result.success||result.offline)ok++;
    }
    if(ok===loadCart.length){
        showToast('\u2705 Load submitted for checking!');
        existingLoad=[...existingLoad,...loadCart.map(i=>({...i,loadQty:i.qty}))];
        loadCart=[];
        updateFloatBtn();renderGrid();renderLoadList();
        document.getElementById('loadCartModal').classList.remove('active');
    }else{showToast('Some items failed to save',true);}
    btn.disabled=false;btn.textContent='\u2705 Submit for Checking';
}
async function capturePhoto(label,filename){
    return new Promise(resolve=>{
        const input=document.createElement('input');input.type='file';input.accept='image/*';input.capture='environment';
        let settled=false;
        function done(val){if(!settled){settled=true;resolve(val);}}
        function onFocus(){setTimeout(()=>{if(!settled)done(null);},600);}
        window.addEventListener('focus',onFocus,{once:true});
        input.onchange=async e=>{
            window.removeEventListener('focus',onFocus);
            const file=e.target.files[0];if(!file){done(null);return;}
            const reader=new FileReader();
            reader.onload=async ev=>{
                const base64=ev.target.result.split(',')[1];showToast('\u23f3 Uploading...');
                try{
                    const res=await fetch(CONFIG.PROXY_URL||CONFIG.APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'photo_upload',imageData:base64,filename,label})});
                    const data=await res.json();
                    if(data.success){showToast('\u2713 Photo saved to Drive!');done(data);}
                    else{showToast('Upload failed',true);done(null);}
                }catch(err){showToast('Upload error',true);done(null);}
            };reader.readAsDataURL(file);
        };
        input.click();
    });
}
async function takeLoadPhoto(){
    const btn=document.getElementById('loadPhotoBtn');btn.disabled=true;btn.textContent='\u23f3 Opening camera...';
    const today=new Date().toISOString().slice(0,10);
    await capturePhoto('Truck Load Sheet','LOAD_'+CONFIG.AGENT_NAME+'_'+today+'.jpg');
    btn.disabled=false;btn.innerHTML='&#128247; Take Photo of Load Sheet';btn.textContent='';
}
// Smart sort: score = frequency * 2 + avg_qty (normalized)
async function computeItemScores(apiKey, sheetId) {
    try {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Load?key=${apiKey}`;
        const r = await fetch(url);
        const data = await r.json();
        const rows = data.values || [];
        if (rows.length < 2) return {};
        const h = rows[0].map(x => x.toLowerCase().trim());
        const iSku = h.indexOf('sku');
        const iQty = h.indexOf('loadqty');
        if (iSku < 0 || iQty < 0) return {};
        // Aggregate per SKU
        const freq = {}, totalQty = {};
        rows.slice(1).forEach(row => {
            const sku = row[iSku] || '';
            const qty = parseInt(row[iQty]) || 0;
            if (!sku) return;
            freq[sku] = (freq[sku] || 0) + 1;
            totalQty[sku] = (totalQty[sku] || 0) + qty;
        });
        // Compute score
        const maxFreq = Math.max(...Object.values(freq), 1);
        const maxQty  = Math.max(...Object.values(totalQty), 1);
        const scores = {};
        Object.keys(freq).forEach(sku => {
            scores[sku] = (freq[sku] / maxFreq) * 2 + (totalQty[sku] / maxQty);
        });
        return scores;
    } catch(e) { return {}; }
}


// ── SMART SORT ────────────────────────────────────────────────
let _sortMap=null,_sortExpiry=0;
async function getSmartSortMap(){
    const now=Date.now();
    if(_sortMap&&now<_sortExpiry)return _sortMap;
    try{
        const url=`https://sheets.googleapis.com/v4/spreadsheets/1DDueHEUvbUeCcornosMg_Vxdq6cvTSVSyTypfUNXSTI/values/DailyLoadBackup?key=${CONFIG.SHEETS_API_KEY}`;
        const res=await fetch(url);const data=await res.json();
        const rows=data.values||[];
        if(rows.length<2)return {};
        const h=rows[0].map(x=>x.toLowerCase().trim());
        const iSKU=h.indexOf('sku'),iLoad=h.indexOf('loadqty');
        const skuData={};
        rows.slice(1).forEach(row=>{
            const sku=(row[iSKU]||'').toString().trim();
            if(!sku)return;
            const qty=parseFloat(row[iLoad])||0;
            if(!skuData[sku]){skuData[sku]={count:0,totalQty:0};}
            skuData[sku].count++;skuData[sku].totalQty+=qty;
        });
        _sortMap={};
        Object.entries(skuData).forEach(([sku,d])=>{
            _sortMap[sku]={freq:d.count,avgQty:d.totalQty/d.count,score:d.count*1000+(d.totalQty/d.count)};
        });
        _sortExpiry=now+30*60*1000;
        return _sortMap;
    }catch(e){return {};}
}
function sortItemsBySmart(items,sortMap){
    return [...items].sort((a,b)=>{
        const sa=sortMap[String(a.sku)]||{score:0};
        const sb=sortMap[String(b.sku)]||{score:0};
        if(sb.score!==sa.score)return sb.score-sa.score;
        return (a.name||'').localeCompare(b.name||'');
    });
}

async function init(){
    const [items, loadData, sortMap] = await Promise.all([
        Sheets.getAllItems(),
        Sheets.getLoad(),
        getSmartSortMap()
    ]);
    allItems = sortItemsBySmart(items || [], sortMap);
    existingLoad = loadData || [];

    // Compute smart sort scores from load history
    try {
        const scores = await computeItemScores(
            CONFIG.SHEETS_API_KEY,
            CONFIG.SPREADSHEET_ID
        );
        if (Object.keys(scores).length > 0) {
            allItems.sort((a, b) => {
                const sA = scores[a.sku] || 0;
                const sB = scores[b.sku] || 0;
                return sB - sA; // highest score first
            });
        }
    } catch(e) {}
    document.getElementById('totalItems').textContent=existingLoad.length;
    document.getElementById('totalQty').textContent=existingLoad.reduce((s,i)=>s+(i.loadQty||0),0);
    document.getElementById('totalValue').textContent=fmt(existingLoad.reduce((s,i)=>s+(i.loadQty||0)*i.price,0));
    buildCategoryTabs();renderGrid();
}
init();
</script>
</body>
